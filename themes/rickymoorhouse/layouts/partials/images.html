{{ with .Resources.ByType "image" }}
<div class="Image">
{{ range . }}
    <figure>
{{ if (isset .Meta.Exif.Tags "ImageDescription") }}
            <a class="image-popup-vertical-fit" href="{{ .RelPermalink }}"><img src="{{ .RelPermalink }}" alt="{{ .Meta.Exif.Tags.ImageDescription }}"></a>
            <figcaption>
            {{ .Meta.Exif.Tags.ImageDescription }}
             </figcaption>
        {{ end }}
    </figure>
{{ end }}
</div>
{{ end }}
