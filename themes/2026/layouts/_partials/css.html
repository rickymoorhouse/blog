<!-- main (minified via Hugo Pipes) -->
{{ $css := resources.Get "css/main.css" | minify | fingerprint }}
<link rel="stylesheet" type="text/css" href="{{ $css.RelPermalink }}" media="all">
<!-- fonts (non-render-blocking) -->
<link href="https://fonts.bunny.net/css2?family=IBM+Plex+Sans:wght@400&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<link href="https://fonts.bunny.net/css2?family=IBM+Plex+Serif:wght@400&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<link href="https://fonts.bunny.net/css2?family=Space+Grotesk:wght@300&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript>
  <link href="https://fonts.bunny.net/css2?family=IBM+Plex+Sans:wght@400&display=swap" rel="stylesheet">
  <link href="https://fonts.bunny.net/css2?family=IBM+Plex+Serif:wght@400&display=swap" rel="stylesheet">
  <link href="https://fonts.bunny.net/css2?family=Space+Grotesk:wght@300&display=swap" rel="stylesheet">
</noscript>
<!-- custom -->
{{ range .Site.Params.css }} <link rel="stylesheet" href="{{ . | relURL }}"> {{ end }}
