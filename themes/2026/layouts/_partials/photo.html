{{ $title := "" }}
{{ if reflect.IsImageResourceWithMeta . }}
  {{ with .Meta }}    
    {{ with .Exif }}
    {{ $title := .Tags.ImageDescription }}
    {{ end }}
  {{ end }}
{{ end }}
<div class="Image"><figure>
    <a class="glightbox" href="{{ .RelPermalink }}" data-description="{{ $title }}">
        {{ $image := .Fill "400x400 center" }}
            <img src="{{ $image.RelPermalink }}" alt="{{ $title }}">
    </a>
    <figcaption>
    {{ $title }}
    </figcaption>
 </figure>
</div>
